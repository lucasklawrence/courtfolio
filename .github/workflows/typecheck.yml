name: Typecheck

on:
  pull_request:
  push:
    branches:
      - main

# Read-only on the repo (only `checkout` needs it); this job typechecks and
# reports a status, never writing back to git. Least-privilege token, matching
# otbeat-ingest.yml.
permissions:
  contents: read

# Cancel a stale run when a newer commit is pushed to the same PR ref —
# successive fixups shouldn't burn parallel runners when only the latest
# matters. Gated to non-main refs so every commit on `main` keeps a completed
# CI verdict (back-to-back merges must not cancel an earlier commit's run).
concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Read-only job — don't leave the GITHUB_TOKEN in .git/config.
          persist-credentials: false

      - name: Set up Node.js and install dependencies
        uses: ./.github/actions/node-setup

      - name: Typecheck
        # `tsc --noEmit` over the whole repo (tests included). Catches type
        # regressions that vitest can't — a `.ts` test with broken fixtures
        # still runs green, but won't compile. This gate is what would have
        # caught the otbeat test type errors before merge.
        run: npm run typecheck
