name: Unit tests

on:
  pull_request:
  push:
    branches:
      - main

# Read-only on the repo (only `checkout` needs it); this job runs tests and
# reports a status, never writing back to git. Least-privilege token, matching
# otbeat-ingest.yml.
permissions:
  contents: read

# Cancel a stale run when a newer commit is pushed to the same ref — successive
# fixups to a PR shouldn't burn parallel runners when only the latest matters.
concurrency:
  group: unit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Read-only job — don't leave the GITHUB_TOKEN in .git/config.
          persist-credentials: false

      - name: Set up Node.js and install dependencies
        uses: ./.github/actions/node-setup

      - name: Run unit tests with coverage thresholds
        # `test:coverage` (not plain `npm test`) so the per-path
        # `lines >= 80` thresholds in vitest.config.ts actually gate PRs
        # instead of applying only to local --coverage runs (#225).
        run: npm run test:coverage
