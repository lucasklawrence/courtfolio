name: Node setup
description: >-
  Set up Node.js (version from .nvmrc, npm cache) and install dependencies with
  `npm ci`. Shared by every workflow so the setup lives in one place. The Node
  version is read from the repo's single `.nvmrc` (also consumed by local
  `nvm use`), so a Node bump is a one-file edit; the `setup-node` action version
  lives here. `checkout` deliberately stays in each workflow: a local composite
  action isn't on disk until after the repo is checked out, so it can't own
  that step.

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        # Single source of truth for the Node version — the same `.nvmrc` the
        # local toolchain uses, so CI and `nvm use` never drift.
        node-version-file: .nvmrc
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash
