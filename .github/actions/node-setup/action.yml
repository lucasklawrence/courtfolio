name: Node setup
description: >-
  Set up Node.js (v24, npm cache) and install dependencies with `npm ci`.
  Shared by every workflow so the toolchain version lives in one place — a
  Node or setup-node bump is a one-file edit instead of a lockstep change
  across all workflows. `checkout` deliberately stays in each workflow: a
  local composite action isn't on disk until after the repo is checked out,
  so it can't own that step.

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash
