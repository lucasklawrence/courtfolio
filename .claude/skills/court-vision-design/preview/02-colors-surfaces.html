<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color — Semantic Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; padding: 16px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .surface { border-radius: 12px; padding: 18px; height: 110px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); }
  .label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em; }
  .desc { font-family: var(--font-sans); font-size: 13px; }
  .arena { background: var(--bg-arena-grad); color: var(--fg-1); position: relative; overflow: hidden; }
  .arena::after { content:""; position:absolute; inset:0; background: var(--bg-arena-radial); }
  .locker { background: var(--hardwood-rich); color: var(--banner-yellow); }
  .paper { background: var(--paper-cream); color: var(--ink-1); border: 1px solid var(--border-paper); }
  .hardwood { background: var(--bg-hardwood); color: var(--fg-1); }
  .arena .label { color: var(--orange-soft); }
  .locker .label { color: var(--banner-gold); }
</style>
</head>
<body>
  <div class="grid">
    <div class="surface arena"><span class="label" style="position:relative; z-index:1">Arena</span><span class="desc" style="position:relative; z-index:1">Black + spotlight blur — hero / banners page</span></div>
    <div class="surface locker"><span class="label">Locker / Hardwood</span><span class="desc">Wood + yellow — zone-entry buttons, placards</span></div>
    <div class="surface paper"><span class="label" style="color:#737373">Paper / Cream</span><span class="desc">Resume, scouting clipboard, sign-here</span></div>
    <div class="surface hardwood"><span class="label" style="color:#fde047">Hardwood Floor</span><span class="desc">Project Binder leather background</span></div>
  </div>
</body>
</html>
