<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Banner Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px 22px 60px; background: linear-gradient(to bottom, #000 0%, #171717 50%, #000 100%); font-family: var(--font-sans); display:flex; gap: 38px; justify-content:center; align-items: flex-start; min-height: 320px; }
  .banner { position: relative; width: 130px; height: 220px; background: #fde047; color: #000; display:flex; flex-direction:column; align-items:center; padding: 20px 8px 0; border-radius: 4px 4px 0 0; box-shadow: 0 12px 24px -8px rgba(0,0,0,0.7); }
  .bar { position:absolute; top:-8px; width: 40px; height: 6px; background: #1f2937; border-radius: 9999px; }
  .year { font-size: 18px; font-weight: 700; }
  .icon { font-size: 32px; margin-top: 8px; }
  .title { font-size: 12px; font-weight: 600; text-align: center; margin-top: 14px; line-height: 1.3; padding: 0 4px; }
  .pennant { position: absolute; bottom: -32px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 65px solid transparent; border-right: 65px solid transparent; border-top: 32px solid #fde047; }
  .b1 { transform: rotate(-1.5deg); }
  .b2 { transform: rotate(1.2deg); }
  .b3 { transform: rotate(-0.8deg); }
</style>
</head>
<body>
  <div class="banner b1"><div class="bar"></div><div class="year">2024</div><div class="icon">📜</div><div class="title">Granted Patent on Network Sync</div><div class="pennant"></div></div>
  <div class="banner b2"><div class="bar"></div><div class="year">2025</div><div class="icon">👑</div><div class="title">KBL Season 7 — Season Champs</div><div class="pennant"></div></div>
  <div class="banner b3"><div class="bar"></div><div class="year">2025</div><div class="icon">🚀</div><div class="title">Launched Production Grade NMS</div><div class="pennant"></div></div>
</body>
</html>
