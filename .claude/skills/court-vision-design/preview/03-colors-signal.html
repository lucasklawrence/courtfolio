<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color — Signal & Shot Range</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #f5f1e6; padding: 18px; color: #0a0a0a; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .item { background: #fff; border: 1px solid #d6cdb6; border-radius: 10px; padding: 12px; }
  .dot { display: inline-block; width: 14px; height: 14px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
  .label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; }
  .meaning { font-size: 11px; color: #737373; margin-top: 4px; }
  h3 { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em; color: #737373; margin: 0 0 10px; font-weight: 500; }
</style>
</head>
<body>
  <h3>Shot Range — semantic accents on light paper</h3>
  <div class="row">
    <div class="item"><span class="dot" style="background:#22c55e"></span><span class="label">deep range</span><div class="meaning">Top-tier skill (React, Next.js)</div></div>
    <div class="item"><span class="dot" style="background:#eab308"></span><span class="label">midrange</span><div class="meaning">Confident (Kafka, gRPC)</div></div>
    <div class="item"><span class="dot" style="background:#2563eb"></span><span class="label">crafty finish</span><div class="meaning">Niche (SVG, D3)</div></div>
    <div class="item"><span class="dot" style="background:#dc2626"></span><span class="label">foul / error</span><div class="meaning">Reserved for warnings</div></div>
  </div>
</body>
</html>
