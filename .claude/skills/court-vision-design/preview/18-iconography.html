<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iconography — Hand-illustrated SVGs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: #f5f1e6; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .item { background: #fff; border: 1px solid #d6cdb6; border-radius: 8px; padding: 10px; display:flex; flex-direction:column; align-items:center; gap: 6px; }
  .item img { width: 60px; height: 60px; object-fit: contain; }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: #737373; text-transform: uppercase; letter-spacing: 0.10em; }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><img src="../assets/icons/basketball.svg" alt=""><div class="lbl">basketball</div></div>
    <div class="item"><img src="../assets/icons/headphones.svg" alt=""><div class="lbl">headphones</div></div>
    <div class="item"><img src="../assets/icons/ps5-controller.svg" alt=""><div class="lbl">ps5</div></div>
    <div class="item"><img src="../assets/icons/vinyl.svg" alt=""><div class="lbl">vinyl</div></div>
    <div class="item"><img src="../assets/icons/trophy.svg" alt=""><div class="lbl">trophy</div></div>
    <div class="item"><img src="../assets/icons/scouting-report.svg" alt=""><div class="lbl">report</div></div>
  </div>
</body>
</html>
