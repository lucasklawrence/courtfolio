<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emoji as Glyphs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: #000; color: #fff; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .item { background: #171717; border-radius: 8px; padding: 8px; display:flex; flex-direction:column; align-items:center; gap: 4px; }
  .e { font-size: 28px; }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: #fdba74; text-align:center; }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="e">🏀</div><div class="lbl">primary</div></div>
    <div class="item"><div class="e">🏟️</div><div class="lbl">rafters</div></div>
    <div class="item"><div class="e">🧳</div><div class="lbl">locker</div></div>
    <div class="item"><div class="e">🎨</div><div class="lbl">binder</div></div>
    <div class="item"><div class="e">📫</div><div class="lbl">contact</div></div>
    <div class="item"><div class="e">🕵️</div><div class="lbl">scouting</div></div>
    <div class="item"><div class="e">📄</div><div class="lbl">resume</div></div>
    <div class="item"><div class="e">⛹️</div><div class="lbl">about</div></div>
    <div class="item"><div class="e">📈</div><div class="lbl">promo</div></div>
    <div class="item"><div class="e">📜</div><div class="lbl">patent</div></div>
    <div class="item"><div class="e">🚀</div><div class="lbl">launch</div></div>
    <div class="item"><div class="e">🥇</div><div class="lbl">champ</div></div>
    <div class="item"><div class="e">🌟</div><div class="lbl">all-star</div></div>
    <div class="item"><div class="e">👑</div><div class="lbl">season</div></div>
    <div class="item"><div class="e">🎓</div><div class="lbl">grad</div></div>
    <div class="item"><div class="e">🎤</div><div class="lbl">music</div></div>
  </div>
</body>
</html>
