<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Mono & Eyebrow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: #000; color: #fff; font-family: var(--font-mono); }
  .row { padding: 8px 0; border-bottom: 1px dashed #262626; display:flex; align-items: baseline; gap: 14px;}
  .row:last-child { border-bottom: 0; }
  .lbl { font-size: 9px; color: #737373; width: 130px; letter-spacing: 0.16em; text-transform: uppercase; flex-shrink: 0;}
</style>
</head>
<body>
  <div class="row"><span class="lbl">eyebrow 10/500</span><span style="font-size:10px; color:#fdba74; text-transform:uppercase; letter-spacing:0.16em;">🕵️ Scouting Area</span></div>
  <div class="row"><span class="lbl">tagline 18/400</span><span style="font-size:18px; color:#fdba74;">Writing code with court vision.</span></div>
  <div class="row"><span class="lbl">page-num 12/400</span><span style="font-size:12px; color:#fff;">Page 1</span></div>
  <div class="row"><span class="lbl">binder-tag 12/500</span><span style="font-size:12px; color:#fde047; text-transform:uppercase; letter-spacing:0.10em;">Lucas Lawrence // Tech Stack Binder</span></div>
  <div class="row"><span class="lbl">code 14/500</span><span style="font-size:14px; color:#fdba74; background:rgba(249,115,22,0.12); padding:2px 6px; border-radius:4px;">npm run dev</span></div>

</html>
