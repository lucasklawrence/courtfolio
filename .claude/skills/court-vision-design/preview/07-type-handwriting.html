<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Patrick Hand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: #f5f1e6; color: #0a0a0a; font-family: var(--font-sans); }
  .clipboard { background: #fff; border: 1px solid #d6cdb6; border-radius: 8px; padding: 18px 22px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 480px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: #737373; text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 12px; }
  .signature { font-family: 'Patrick Hand', cursive; font-size: 22px; color: #333; }
  .line { width: 220px; border-bottom: 1px solid #444; margin-top: 4px; }
  .note { font-family: 'Patrick Hand', cursive; font-size: 18px; color: #555; margin-top: 14px; }
</style>
</head>
<body>
  <div class="clipboard">
    <div class="meta">Patrick Hand — handwritten flavor</div>
    <span class="signature">x </span>
    <div class="line"></div>
    <div class="note">— sign here, coach</div>
  </div>
</body>
</html>
