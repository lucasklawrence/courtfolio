<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lineup — Stat Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: #000; font-family: var(--font-sans); color: #fff; }
  .card { padding: 14px 18px; background: rgba(154, 52, 18, 0.30); border: 1px solid rgba(253,186,116,0.40); border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.5); width: 230px; }
  .h3 { font-weight: 700; font-size: 18px; text-align: center; margin: 0 0 8px; }
  ul { margin: 0; padding-left: 20px; font-size: 13px; line-height: 1.6; }
  .row { display: flex; gap: 18px; }
</style>
</head>
<body>
  <div class="row">
    <div class="card">
      <div class="h3">🧠 Principles Lineup</div>
      <ul><li>#7 Clean Code (PG)</li><li>#24 SoC (SG)</li><li>#11 Scalability (SF)</li><li>#13 Tests (PF)</li><li>#35 Arch Consistency (C)</li></ul>
    </div>
    <div class="card">
      <div class="h3">🧰 Tech Stack Lineup</div>
      <ul><li>#10 React (PG)</li><li>#22 Spring Boot (SG)</li><li>#33 Kafka (SF)</li><li>#18 PostgreSQL (PF)</li><li>#44 Kubernetes (C)</li></ul>
    </div>
  </div>
</body>
</html>
