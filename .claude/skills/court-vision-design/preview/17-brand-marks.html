<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo & Brand Marks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: #000; font-family: var(--font-sans); color: #fff; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .item { background: #171717; border-radius: 10px; padding: 16px; display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .item img { max-width: 100%; max-height: 90px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: #fdba74; text-transform: uppercase; letter-spacing: 0.16em; }
</style>
</head>
<body>
  <div class="item"><img src="../assets/court-vision-logo.svg" alt="Court Vision"><div class="lbl">Court Vision Wordmark</div></div>
  <div class="item"><img src="../assets/favicon.svg" alt="Favicon"><div class="lbl">Favicon — basketball</div></div>
  <div class="item" style="background:#fde047;"><img src="../assets/ghost-logo.svg" alt="Snap Ghost"><div class="lbl" style="color:#42210b">Snap Ghost (jersey only)</div></div>
</body>
</html>
