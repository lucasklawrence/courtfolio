<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buttons — Primary & Pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: #000; font-family: var(--font-sans); color: #fff; }
  .row { display:flex; flex-wrap: wrap; gap: 14px; align-items: center; margin-bottom: 14px; }
  .lbl { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.16em; color: #737373; width: 100%; margin-bottom: 4px; }
  .pill { display:inline-flex; align-items:center; gap:8px; padding: 8px 18px; border-radius: 9999px; font-weight:600; font-size: 14px; cursor: pointer; border: none; transition: all .18s; }
  .pill:focus-visible { outline: 2px solid #fde047; outline-offset: 2px; }
  .step { padding: 12px 24px; font-size: 16px; }
  .primary { background: #ea580c; color: #fff; }
  .primary:hover, .primary:focus-visible { background: #c2410c; }
  .light { background: #fff; color: #000; }
  .light:hover, .light:focus-visible { background: #fb923c; }
  .black { background: #000; color: #fff; border: 1px solid #262626; }
  .black:hover, .black:focus-visible { background: #f97316; border-color: #f97316; }
  .replay { background: #ea580c; color: #fff; padding: 6px 14px; font-size: 13px; }
  .replay:focus-visible { background: #c2410c; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">Hero CTA — white pill, orange hover</span>
    <button type="button" class="pill light step">🏀 Step Onto the Court</button>
  </div>
  <div class="row"><span class="lbl">Primary action — orange-600 → orange-700</span>
    <button type="button" class="pill primary">→ Next</button>
    <button type="button" class="pill primary">Skip</button>
  </div>
  <div class="row"><span class="lbl">Replay tour — small orange pill</span>
    <button type="button" class="pill replay">🔁 Replay Tour</button>
  </div>
  <div class="row"><span class="lbl">Black pill (back-to-court) — flips to orange on hover</span>
    <button type="button" class="pill black">🏀 Back to Home Court</button>
  </div>
</body>
</html>
